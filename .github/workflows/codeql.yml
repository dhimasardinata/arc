name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "24 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, python]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Initialize CodeQL for C/C++
        if: matrix.language == 'c-cpp'
        uses: github/codeql-action/init@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          dependency-caching: false
          queries: +security-extended,security-and-quality

      - name: Initialize CodeQL
        if: matrix.language != 'c-cpp'
        uses: github/codeql-action/init@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        with:
          languages: ${{ matrix.language }}
          dependency-caching: false
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
        with:
          category: "/language:${{ matrix.language }}"
