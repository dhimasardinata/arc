name: build

on:
  push:
  pull_request:

jobs:
  esp32s3:
    runs-on: ubuntu-latest
    env:
      ARC_IDF_VERSION: v6.0
      ARC_IDF_TARGET: esp32s3
      ARC_PYTHON: "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.ARC_PYTHON }}

      - name: Ensure host tools
        shell: bash
        run: |
          missing=()
          command -v git >/dev/null || missing+=(git)
          command -v wget >/dev/null || missing+=(wget)
          command -v flex >/dev/null || missing+=(flex)
          command -v bison >/dev/null || missing+=(bison)
          command -v gperf >/dev/null || missing+=(gperf)
          command -v cmake >/dev/null || missing+=(cmake)
          command -v ninja >/dev/null || missing+=(ninja-build)
          command -v ccache >/dev/null || missing+=(ccache)
          python3 --version >/dev/null 2>&1 || missing+=(python3)
          python3 -m pip --version >/dev/null 2>&1 || missing+=(python3-pip)
          python3 -m venv --help >/dev/null 2>&1 || missing+=(python3-venv)
          if ((${#missing[@]})); then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi

      - name: Cache ESP-IDF and tools
        uses: actions/cache@v4
        with:
          path: |
            ~/esp-idf
            ~/.espressif
          key: ${{ runner.os }}-esp-idf-${{ env.ARC_IDF_VERSION }}-${{ env.ARC_IDF_TARGET }}-py${{ env.ARC_PYTHON }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.ARC_IDF_VERSION }}-py${{ env.ARC_PYTHON }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.ARC_IDF_VERSION }}-py${{ env.ARC_PYTHON }}-

      - name: Ensure ESP-IDF
        shell: bash
        run: |
          if [[ ! -x "$HOME/esp-idf/export.sh" ]]; then
            git clone --branch "${ARC_IDF_VERSION}" --depth 1 --recursive https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          fi
          if ! find "$HOME/.espressif/python_env" -maxdepth 1 -type d -name "idf${ARC_IDF_VERSION#v}_py*" 2>/dev/null | grep -q .; then
            "$HOME/esp-idf/install.sh" "${ARC_IDF_TARGET}"
          fi

      - name: Repo sanity
        shell: bash
        run: |
          chmod +x tools/check-repo.sh
          ./tools/check-repo.sh

      - name: Build all
        shell: bash
        run: |
          export ARC_IDF_PATH="$HOME/esp-idf"
          export IDF_CCACHE_ENABLE=1
          ccache --max-size 300M || true
          . ./env.sh
          app_bin() {
            find build -maxdepth 1 -type f -name '*.bin' \
              ! -name 'bootloader.bin' \
              ! -name 'partition-table.bin' \
              ! -name 'ota_data_initial.bin' \
              -printf '%f\n' | head -n 1
          }
          for dir in . examples/*; do
            [[ -d "$dir" ]] || continue
            if [[ "$dir" == "." ]]; then
              label=root
            else
              label="$(basename "$dir")"
            fi
            echo "::group::build $label"
            pushd "$dir" >/dev/null
            idf.py build
            idf.py size
            bin="$(app_bin)"
            echo "$label $bin $(stat -c '%s' "build/$bin") bytes" >> "$GITHUB_STEP_SUMMARY"
            popd >/dev/null
            echo "::endgroup::"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: arc-binaries
          path: |
            build/*.bin
            build/*.elf
            examples/*/build/*.bin
            examples/*/build/*.elf
