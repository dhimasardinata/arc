name: build

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  esp32s3:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      ARC_IDF_VERSION: v6.0.1
      ARC_IDF_REF: d59a48530db46665ea70e2876738062ee0a9cdc2
      ARC_IDF_TARGET: esp32s3
      ARC_PYTHON: "3.12"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.ARC_PYTHON }}

      - name: Plan firmware builds
        id: firmware-plan
        shell: bash
        env:
          ARC_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -eo pipefail
          base_args=()
          if [[ -n "${ARC_BASE_SHA:-}" && ! "$ARC_BASE_SHA" =~ ^0+$ ]]; then
            if [[ ! "$ARC_BASE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "base SHA is not a 40-hex commit; building all firmware projects"
            elif git fetch --no-tags --depth=1 origin "$ARC_BASE_SHA"; then
              base_args+=(--base "$ARC_BASE_SHA")
            else
              echo "base $ARC_BASE_SHA unavailable; building all firmware projects"
            fi
          fi
          ./tools/ci-build-plan.py --buildable "${base_args[@]}" | tee .arc-build-projects
          count="$(grep -c . .arc-build-projects || true)"
          {
            echo "count=$count"
            echo "projects<<EOF"
            cat .arc-build-projects
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if ((count == 0)); then
            echo "No firmware projects selected for this change set." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Ensure host tools
        shell: bash
        env:
          ARC_FIRMWARE_COUNT: ${{ steps.firmware-plan.outputs.count }}
        run: |
          set -eo pipefail
          missing=()
          command -v git >/dev/null || missing+=(git)
          command -v g++ >/dev/null || missing+=(g++)
          command -v cmake >/dev/null || missing+=(cmake)
          command -v ninja >/dev/null || missing+=(ninja-build)
          command -v clang-format >/dev/null || missing+=(clang-format)
          command -v go >/dev/null || missing+=(golang-go)
          python3 --version >/dev/null 2>&1 || missing+=(python3)
          python3 -m pip --version >/dev/null 2>&1 || missing+=(python3-pip)
          python3 -m venv --help >/dev/null 2>&1 || missing+=(python3-venv)
          if [[ "${ARC_FIRMWARE_COUNT:-0}" != "0" ]]; then
            command -v wget >/dev/null || missing+=(wget)
            command -v flex >/dev/null || missing+=(flex)
            command -v bison >/dev/null || missing+=(bison)
            command -v gperf >/dev/null || missing+=(gperf)
            command -v ccache >/dev/null || missing+=(ccache)
          fi
          if ((${#missing[@]})); then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi

      - name: Ensure format tools
        shell: bash
        run: |
          set -eo pipefail
          python3 -m pip install 'ruff==0.15.16'

      - name: Restore ESP-IDF and tools cache
        id: idf-cache
        if: steps.firmware-plan.outputs.count != '0'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/esp-idf
            ~/.espressif
          key: ${{ runner.os }}-esp-idf-${{ env.ARC_IDF_REF }}-${{ env.ARC_IDF_TARGET }}-py${{ env.ARC_PYTHON }}
          restore-keys: |
            ${{ runner.os }}-esp-idf-${{ env.ARC_IDF_REF }}-${{ env.ARC_IDF_TARGET }}-
            ${{ runner.os }}-esp-idf-${{ env.ARC_IDF_VERSION }}-${{ env.ARC_IDF_TARGET }}-

      - name: Restore ccache
        if: steps.firmware-plan.outputs.count != '0'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.ARC_IDF_REF }}-py${{ env.ARC_PYTHON }}-${{ hashFiles('components/**/*.hpp', 'components/**/*.cpp', 'examples/**/CMakeLists.txt', 'examples/**/sdkconfig.defaults', 'cmake/**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.ARC_IDF_REF }}-py${{ env.ARC_PYTHON }}-
            ${{ runner.os }}-ccache-${{ env.ARC_IDF_VERSION }}-py${{ env.ARC_PYTHON }}-

      - name: Restore firmware build cache
        id: firmware-build-cache
        if: steps.firmware-plan.outputs.count != '0'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .arc-build-cache
          key: ${{ runner.os }}-firmware-build-${{ env.ARC_IDF_REF }}-${{ env.ARC_IDF_TARGET }}-${{ hashFiles('CMakeLists.txt', 'main/CMakeLists.txt', 'sdkconfig.defaults*', 'partitions_*.csv', 'components/**/CMakeLists.txt', 'cmake/**/*.cmake', 'examples/**/CMakeLists.txt', 'examples/**/sdkconfig.defaults*', 'examples/**/partitions_*.csv') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-firmware-build-${{ env.ARC_IDF_REF }}-${{ env.ARC_IDF_TARGET }}-${{ hashFiles('CMakeLists.txt', 'main/CMakeLists.txt', 'sdkconfig.defaults*', 'partitions_*.csv', 'components/**/CMakeLists.txt', 'cmake/**/*.cmake', 'examples/**/CMakeLists.txt', 'examples/**/sdkconfig.defaults*', 'examples/**/partitions_*.csv') }}-

      - name: Ensure ESP-IDF
        if: steps.firmware-plan.outputs.count != '0'
        shell: bash
        run: |
          set -eo pipefail
          if [[ -d "$HOME/esp-idf/.git" ]]; then
            git -C "$HOME/esp-idf" remote set-url origin https://github.com/espressif/esp-idf.git
          else
            rm -rf "$HOME/esp-idf"
            git clone --depth 1 --branch "${ARC_IDF_VERSION}" https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          fi
          current="$(git -C "$HOME/esp-idf" rev-parse HEAD)"
          if [[ "$current" != "$ARC_IDF_REF" ]]; then
            git -C "$HOME/esp-idf" fetch --depth 1 origin "$ARC_IDF_REF" || \
              git -C "$HOME/esp-idf" fetch --depth 1 origin "refs/tags/${ARC_IDF_VERSION}:refs/tags/${ARC_IDF_VERSION}"
            git -C "$HOME/esp-idf" checkout --force "$ARC_IDF_REF"
          fi
          git -C "$HOME/esp-idf" submodule update --init --recursive --depth 1
          test -f "$HOME/esp-idf/export.sh"
          if ! find "$HOME/.espressif/python_env" -maxdepth 1 -type d -name "idf${ARC_IDF_VERSION#v}_py*" 2>/dev/null | grep -q .; then
            "$HOME/esp-idf/install.sh" "${ARC_IDF_TARGET}"
          fi

      - name: Save ESP-IDF and tools cache
        if: github.event_name == 'push' && steps.firmware-plan.outputs.count != '0' && steps.idf-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/esp-idf
            ~/.espressif
          key: ${{ runner.os }}-esp-idf-${{ env.ARC_IDF_REF }}-${{ env.ARC_IDF_TARGET }}-py${{ env.ARC_PYTHON }}

      - name: Repo sanity
        shell: bash
        run: |
          set -eo pipefail
          chmod +x tools/check-repo.sh
          ./tools/check-repo.sh

      - name: Repository evidence bundle
        shell: bash
        run: |
          set -eo pipefail
          mkdir -p .arc-artifacts
          ./tools/source-manifest.py --format json --require-clean > .arc-artifacts/source-manifest.json
          ./tools/third-party-manifest-check.py --format json > .arc-artifacts/third-party-manifest.json
          ./tools/safety-case-check.py --format json > .arc-artifacts/safety-case.json
          ./tools/release-evidence.py --format json --require-clean > .arc-artifacts/release-evidence.json
          ./tools/workflow-pins-check.py --format json > .arc-artifacts/workflow-pins.json
          ./tools/workflow-policy-check.py --format json > .arc-artifacts/workflow-policy.json
          ./tools/dependabot-policy-check.py --format json > .arc-artifacts/dependabot-policy.json
          ./tools/npm-lock-check.py --format json > .arc-artifacts/npm-lock.json
          ./tools/license-policy-check.py --format json > .arc-artifacts/license-policy.json
          ./tools/secret-scan-check.py --format json > .arc-artifacts/secret-scan.json
          ./tools/sbom.py --format json --output .arc-artifacts/sbom.spdx.json
          ./tools/provenance.py --format json --output .arc-artifacts/provenance.intoto.json \
            .arc-artifacts/source-manifest.json \
            .arc-artifacts/third-party-manifest.json \
            .arc-artifacts/safety-case.json \
            .arc-artifacts/release-evidence.json \
            .arc-artifacts/workflow-pins.json \
            .arc-artifacts/workflow-policy.json \
            .arc-artifacts/dependabot-policy.json \
            .arc-artifacts/npm-lock.json \
            .arc-artifacts/license-policy.json \
            .arc-artifacts/secret-scan.json \
            .arc-artifacts/sbom.spdx.json
          ./tools/evidence-index.py --format json --output .arc-artifacts/evidence-index.json \
            --require .arc-artifacts/source-manifest.json \
            --require .arc-artifacts/third-party-manifest.json \
            --require .arc-artifacts/safety-case.json \
            --require .arc-artifacts/release-evidence.json \
            --require .arc-artifacts/workflow-pins.json \
            --require .arc-artifacts/workflow-policy.json \
            --require .arc-artifacts/dependabot-policy.json \
            --require .arc-artifacts/npm-lock.json \
            --require .arc-artifacts/license-policy.json \
            --require .arc-artifacts/secret-scan.json \
            --require .arc-artifacts/sbom.spdx.json \
            --require .arc-artifacts/provenance.intoto.json \
            .arc-artifacts/source-manifest.json \
            .arc-artifacts/third-party-manifest.json \
            .arc-artifacts/safety-case.json \
            .arc-artifacts/release-evidence.json \
            .arc-artifacts/workflow-pins.json \
            .arc-artifacts/workflow-policy.json \
            .arc-artifacts/dependabot-policy.json \
            .arc-artifacts/npm-lock.json \
            .arc-artifacts/license-policy.json \
            .arc-artifacts/secret-scan.json \
            .arc-artifacts/sbom.spdx.json \
            .arc-artifacts/provenance.intoto.json
          ./tools/evidence-bundle-check.py .arc-artifacts

      - name: Upload repository evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arc-evidence
          path: |
            .arc-artifacts/evidence-index.json
            .arc-artifacts/source-manifest.json
            .arc-artifacts/third-party-manifest.json
            .arc-artifacts/safety-case.json
            .arc-artifacts/release-evidence.json
            .arc-artifacts/workflow-pins.json
            .arc-artifacts/workflow-policy.json
            .arc-artifacts/dependabot-policy.json
            .arc-artifacts/npm-lock.json
            .arc-artifacts/license-policy.json
            .arc-artifacts/secret-scan.json
            .arc-artifacts/sbom.spdx.json
            .arc-artifacts/provenance.intoto.json
          if-no-files-found: error
          retention-days: 30

      - name: Host tests
        shell: bash
        run: |
          set -eo pipefail
          chmod +x tools/host-tests.sh
          ./tools/host-tests.sh

      - name: Host schema generator
        shell: bash
        run: |
          set -eo pipefail
          go run tools/arc-gen.go -root .

      - name: Host formal specs
        shell: bash
        run: |
          set -eo pipefail
          chmod +x tools/arc-prove.sh
          ./tools/arc-prove.sh

      - name: Host benchmarks
        if: steps.firmware-plan.outputs.count != '0'
        shell: bash
        run: |
          set -eo pipefail
          chmod +x tools/host-bench.sh
          chmod +x tools/framework-compare.sh
          ./tools/host-bench.sh
          ARC_SKIP_HOST_BENCH=1 ARC_IDF_PATH="$HOME/esp-idf" ./tools/framework-compare.sh

      - name: Build firmware
        id: build-firmware
        if: steps.firmware-plan.outputs.count != '0'
        shell: bash
        env:
          ARC_BUILD_CACHE_MAX_PROJECTS: "4"
        run: |
          set -eo pipefail
          export ARC_IDF_PATH="$HOME/esp-idf"
          export IDF_CCACHE_ENABLE=1
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_DIR="$HOME/.ccache"
          export CCACHE_COMPRESS=1
          export CCACHE_COMPRESSLEVEL=6
          ccache --max-size 2G || true
          ccache --set-config=sloppiness=file_macro,time_macros,include_file_mtime,include_file_ctime || true
          . ./env.sh
          dump_idf_logs() {
            local label="$1"
            shopt -s nullglob
            local logs=(build/log/idf_py_stderr_output_* build/log/idf_py_stdout_output_*)
            shopt -u nullglob
            for log in "${logs[@]}"; do
              echo "::group::$label $(basename "$log")"
              cat "$log"
              echo "::endgroup::"
            done
          }
          app_bin() {
            find build -maxdepth 1 -type f -name '*.bin' \
              ! -name 'bootloader.bin' \
              ! -name 'partition-table.bin' \
              ! -name 'ota_data_initial.bin' \
              -printf '%f\n' | head -n 1
          }
          build_cache_root="$PWD/.arc-build-cache"
          cache_slug() {
            local dir="$1"
            if [[ "$dir" == "." ]]; then
              printf '%s\n' root
            else
              printf '%s\n' "${dir//\//__}"
            fi
          }
          restore_build_dir() {
            local dir="$1"
            local slug cached target
            slug="$(cache_slug "$dir")"
            cached="$build_cache_root/$slug/build"
            target="$dir/build"
            if [[ -d "$cached" && ! -e "$target" ]]; then
              echo "restoring build cache for $dir"
              mkdir -p "$dir"
              cp -a "$cached" "$target"
            fi
          }
          save_build_dir() {
            local dir="$1"
            local slug target
            slug="$(cache_slug "$dir")"
            target="$dir/build"
            if [[ -d "$target" ]]; then
              rm -rf "$build_cache_root/$slug"
              mkdir -p "$build_cache_root/$slug"
              cp -a "$target" "$build_cache_root/$slug/build"
            fi
          }
          project_output="$(cat .arc-build-projects)"
          project_dirs=()
          if [[ -n "$project_output" ]]; then
            mapfile -t project_dirs <<< "$project_output"
          fi
          if ((${#project_dirs[@]} == 0)); then
            echo "no Arc build projects discovered"
            exit 1
          fi
          cache_limit="${ARC_BUILD_CACHE_MAX_PROJECTS:-4}"
          cache_ready=0
          if ((${#project_dirs[@]} > cache_limit)); then
            rm -rf "$build_cache_root"
            echo "build-dir cache disabled for ${#project_dirs[@]} projects" >> "$GITHUB_STEP_SUMMARY"
          else
            mkdir -p "$build_cache_root"
          fi
          for dir in "${project_dirs[@]}"; do
            if [[ "$dir" == "." ]]; then
              label=root
            else
              label="${dir#examples/}"
              label="${label//\//-}"
            fi
            echo "::group::build $label"
            if ((${#project_dirs[@]} <= cache_limit)); then
              restore_build_dir "$dir"
            fi
            pushd "$dir" >/dev/null
            if ! idf.py build; then
              dump_idf_logs "$label"
              exit 1
            fi
            idf.py size
            bin="$(app_bin)"
            echo "$label $bin $(stat -c '%s' "build/$bin") bytes" >> "$GITHUB_STEP_SUMMARY"
            popd >/dev/null
            if ((${#project_dirs[@]} <= cache_limit)); then
              save_build_dir "$dir"
              cache_ready=1
            fi
            echo "::endgroup::"
          done
          echo "cache_ready=$cache_ready" >> "$GITHUB_OUTPUT"
          ccache --show-stats || true

      - name: Save ccache
        if: github.event_name == 'push' && steps.firmware-plan.outputs.count != '0'
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ env.ARC_IDF_REF }}-py${{ env.ARC_PYTHON }}-${{ hashFiles('components/**/*.hpp', 'components/**/*.cpp', 'examples/**/CMakeLists.txt', 'examples/**/sdkconfig.defaults', 'cmake/**/*.cmake') }}

      - name: Firmware artifact manifest
        if: steps.firmware-plan.outputs.count != '0'
        shell: bash
        run: |
          set -eo pipefail
          ./tools/firmware-manifest.py --format json --require-artifacts --output .arc-artifacts/firmware-manifest.json
          ./tools/evidence-index.py --format json --output .arc-artifacts/firmware-evidence-index.json \
            --require .arc-artifacts/firmware-manifest.json \
            .arc-artifacts/firmware-manifest.json

      - name: Validate clangd database
        if: steps.firmware-plan.outputs.count != '0'
        shell: bash
        env:
          ARC_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -eo pipefail
          extra_args=()
          if [[ -n "${ARC_BASE_SHA:-}" && ! "$ARC_BASE_SHA" =~ ^0+$ ]]; then
            if [[ ! "$ARC_BASE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "base SHA is not a 40-hex commit; validating all Arc headers"
            else
              git fetch --no-tags --depth=1 origin "$ARC_BASE_SHA" || true
              changed="$(git diff --name-only "$ARC_BASE_SHA" HEAD -- || true)"
              if grep -qE '^(components/|cmake/|\.clangd|\.zed/|tools/clangd-compile-commands)' <<< "$changed"; then
                if grep -qE '^components/arc/include/.*\.(h|hh|hpp|hxx)$' <<< "$changed"; then
                  extra_args+=(--changed-arc-headers "$ARC_BASE_SHA")
                fi
              else
                echo "No clangd-relevant public header or dependency changes; skipping header validation."
                exit 0
              fi
            fi
          fi
          go run tools/clangd-compile-commands.go --validate-arc-headers -o compile_commands.json "${extra_args[@]}"

      - name: Upload binaries
        if: steps.firmware-plan.outputs.count != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arc-binaries
          path: |
            build/*.bin
            build/*.elf
            examples/**/build/*.bin
            examples/**/build/*.elf
            .arc-artifacts/firmware-evidence-index.json
            .arc-artifacts/firmware-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Save firmware build cache
        if: github.event_name == 'push' && steps.firmware-plan.outputs.count != '0' && steps.build-firmware.outputs.cache_ready == '1'
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .arc-build-cache
          key: ${{ runner.os }}-firmware-build-${{ env.ARC_IDF_REF }}-${{ env.ARC_IDF_TARGET }}-${{ hashFiles('CMakeLists.txt', 'main/CMakeLists.txt', 'sdkconfig.defaults*', 'partitions_*.csv', 'components/**/CMakeLists.txt', 'cmake/**/*.cmake', 'examples/**/CMakeLists.txt', 'examples/**/sdkconfig.defaults*', 'examples/**/partitions_*.csv') }}-${{ github.sha }}
