name: build

on:
  push:
  pull_request:

jobs:
  esp32s3:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            flex \
            bison \
            gperf \
            python3 \
            python3-pip \
            python3-venv \
            cmake \
            ninja-build \
            ccache \
            libffi-dev \
            libssl-dev \
            dfu-util \
            libusb-1.0-0

      - name: Install ESP-IDF v6.0
        run: |
          git clone --branch v6.0 --recursive https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          "$HOME/esp-idf/install.sh" esp32s3

      - name: Repo sanity
        shell: bash
        run: |
          chmod +x tools/check-repo.sh
          ./tools/check-repo.sh

      - name: Build all
        shell: bash
        run: |
          export ARC_IDF_PATH="$HOME/esp-idf"
          . ./env.sh
          app_bin() {
            find build -maxdepth 1 -type f -name '*.bin' \
              ! -name 'bootloader.bin' \
              ! -name 'partition-table.bin' \
              ! -name 'ota_data_initial.bin' \
              -printf '%f\n' | head -n 1
          }
          for dir in . examples/*; do
            [[ -d "$dir" ]] || continue
            if [[ "$dir" == "." ]]; then
              label=root
            else
              label="$(basename "$dir")"
            fi
            echo "::group::build $label"
            pushd "$dir" >/dev/null
            idf.py build
            idf.py size
            bin="$(app_bin)"
            echo "$label $bin $(stat -c '%s' "build/$bin") bytes" >> "$GITHUB_STEP_SUMMARY"
            popd >/dev/null
            echo "::endgroup::"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: arc-binaries
          path: |
            build/*.bin
            build/*.elf
            examples/*/build/*.bin
            examples/*/build/*.elf
